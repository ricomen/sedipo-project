<h1 class="western">ДОГОВОР № {$order_data['contract_number']}<br/> на организацию и проведение производственной практики</h1>


<table border="0" width="100%"><tr><td><p class="westernli" >г.Уфа</p></td><td></td> <td align="right" style="text-align: right">{$order_data['date_order']|date_format:"%e.%m.%Y"}</td></tr></table>


<p class="western" > <b>Общество с ограниченной ответственностью «Институт профессионального образования» (ООО «ИПО»),</b>
именуемое в дальнейшем «Заказчик», в лице директора {$self_data['enterprise_manager2']},
действующего на основании Устава, и и в соответствии с Лицензией на право ведения образовательной деятельности, выданной Управлением по контролю и надзору в сфере образования Республики Башкортостан серия № Л035-01198-02/00962026 от «12» декабря 2023 г., и</p>

<p class="western" > 
<b>_________________</b>, в лице <b>_________________</b>,
именуемый в дальнейшем «Исполнитель», с другой стороны, именуемые в дальнейшем «Стороны», заключили договор о нижеследующем:
</p>

<h3 style="page-break-before: auto;"  class="western">1. Предмет договора</h3>


<p class="western">
<span style="margin-right:5px;">1.1.</span> Целью настоящего Договора является организация производственной практики Обучающихся Заказчика согласно основным программам профессиональной подготовки профессионального обучения/повышения квалификации/профессиональной переподготовки.
</p>
<p class="western">
<span style="margin-right:5px;">1.2.</span>Исполнитель предоставляет места для прохождения практики Обучающимся, а Заказчик направляет Обучающихся для прохождения практики по программам профессиональной подготовки профессионального обучения/повышения квалификации/профессиональной переподготовки, указанным в Приложении № 1. 
</p>
<p class="western">
<span style="margin-right:5px;">1.3.</span>Продолжительность ежедневной занятости при прохождении практики устанавливается в соответствии с требованиями трудового законодательства РФ.
</p>
<p class="western">
<span style="margin-right:5px;">1.4.</span>С момента зачисления Обучающихся на период практики в качестве практикантов на рабочие места на них распространяются правила охраны труда и правила внутреннего трудового распорядка, действующие у Исполнителя.
</p>

<h3 style="page-break-before: avoid;"  class="western">2. Права и обязанности Сторон</h3>

<p class="western">
<b><span style="margin-right:5px;">2.1.</span>Заказчик обязан:</b>
</p>
<p class="western">
<span style="margin-right:5px;">2.1.1.</span>Для успешного прохождения Обучающимися производственной практики, обеспечить качественную предварительную теоретическую подготовку в соответствии с учебными планами и программами по профессии.
</p>
<p class="western">
<span style="margin-right:5px;">2.1.2.</span>Разработать и представить Исполнителю состав и объем работ производственной практики в соответствии с программой и квалификационной характеристикой по профессии.
</p>
<p class="western">
<span style="margin-right:5px;">2.1.3.</span>Обеспечить Обучающихся учебно-учетной документацией (дневник производственного обучения).
</p>
<p class="western">
<span style="margin-right:5px;">2.1.4.</span>Оказывать методическую помощь специалистам Исполнителя в проведении производственной практики, назначить мастера производственного обучения, соответствующего квалификационным требованиям.
</p>

<p class="western">
<b><span style="margin-right:5px;">2.2.</span>Исполнитель обязан:</b>
</p>
<p class="western">
<span style="margin-right:5px;">2.2.1.</span>Предоставить для производственной практики агрегаты, инструменты, наглядные пособия производственного характера и рабочие места (участки), соответствующие требованиям учебных программ, перечням производственных работ и рабочим планам производственной практики.
</p>
<p class="western">
<span style="margin-right:5px;">2.2.2.</span>Для проведения производственной практики Обучающихся выделить высококвалифицированных рабочих в качестве наставников.
</p>
<p class="western">
<span style="margin-right:5px;">2.2.3.</span>Ознакомить Обучающихся с действующими у Исполнителя правилами и нормами по технике
безопасности и противопожарной безопасности и провести необходимый инструктаж с соответствующим документальным оформлением.
</p>
<p class="western">
<span style="margin-right:5px;">2.2.4.</span>Создавать Обучающимся безопасные условия труда, не допускать использования их на работах, не связанных с изучаемой профессией.
</p>
<p class="western">
<span style="margin-right:5px;">2.2.5.</span>Своевременно информировать ООО «ИПО» об Обучающихся, пропускающих производственную практику без уважительных причин.
</p>
<p class="western">
<span style="margin-right:5px;">2.2.6.</span>Итоги производственной практики завершить квалификационной пробной работой, по результатам которой выдать заключение о достигнутом уровне квалификации (указать в дневнике производственного обучения, находящегося у Обучающегося).
</p>

<h3 style="page-break-before: avoid;"  class="western">3. Порядок оплаты, сдачи и приемки оказанных услуг
	</h3>

<p class="western">
<span style="margin-right:5px;">3.1.</span>Стоимость услуг по настоящему договору определяется в соответствии с Приложением № 2 к настоящему договору.
</p>
<p class="western">
<span style="margin-right:5px;">3.2.</span>Расчеты по договору производятся в безналичной форме по реквизитам, указанным в разделе 6 настоящего договора в течении тридцати календарных дней со дня выставленного Исполнителем счета.
</p>
<p class="western">
<span style="margin-right:5px;">3.3.</span>Приемка оказанных Исполнителем Услуг, предусмотренных настоящим договором, оформляется Актом оказанных услуг по форме приложения 3 к настоящему Договору (далее -Акт).
</p>
<p class="western">
<span style="margin-right:5px;">3.4.</span>В течение 3 (трех) рабочих дней со дня окончания оказания Услуги Исполнитель предоставляет Заказчику Акт.
</p>
<p class="western">
<span style="margin-right:5px;">3.5.</span>Заказчик в течение 3 (трех) рабочих дней с момента получения от Исполнителя Акта обязан принять надлежащим образом оказанные услуги и подписать Акт или направить Исполнителю мотивированный отказ от приемки Услуг.
</p>

<h3 style="page-break-before: avoid;"  class="western">4. Срок действия Договора, основания его прекращения</h3>

<p class="western">
<span style="margin-right:5px;">4.1.</span>Настоящий договор вступает в силу со дня его заключения сторонами и действует до 31 декабря 2024 г. Если стороны не заявили о расторжении договора за 30 (тридцать) дней до его окончания, договор пролонгируется на следующий календарный год на тех же условиях. 
</p>
<p class="western">
<span style="margin-right:5px;">4.2.</span>Сроки прохождения производственной практики определяются программой обучения.
</p>
<p class="western">
<span style="margin-right:5px;">4.3.</span>Настоящий Договор может быть прекращен по основаниям, установленным действующим законодательством Российской Федерации.
</p>
<p class="western">
<span style="margin-right:5px;">4.4.</span>Стороны вправе по обоюдному согласию отказаться от исполнения настоящего Договора в любой момент с предварительным письменным уведомлением другой стороны не менее чем за 14 (четырнадцать) дней до предполагаемой даты прекращения настоящего Договора.
</p>
<p class="western">
<span style="margin-right:5px;">4.5.</span>В случае возникновения споров или разногласий по исполнению условий настоящего Договора, стороны обязуются принимать все меры к их разрешению путем взаимных консультаций и переговоров.
</p>
<p class="western">
<span style="margin-right:5px;">4.6.</span>Споры между сторонами, возникающие при исполнении настоящего Договора разрешаются по соглашению сторон.
</p>
<p class="western">
<span style="margin-right:5px;">4.7.</span>Во всем остальном, не предусмотренном настоящим Договором, Стороны будут руководствоваться действующим законодательством Российской Федерации.
</p>

<h3 style="page-break-before: avoid;"  class="western">5. Заключительные положения</h3>

<p class="western">
<span style="margin-right:5px;">5.1.</span>Всю ответственность за вред, который может наступить вследствие действий, совершенных Обучающимся, по разглашению конфиденциальной информации Исполнителя, а также за нарушение интеллектуальных, авторских и иных неимущественных прав несет Обучающийся.
</p>
<p class="western">
<span style="margin-right:5px;">5.2.</span>Несчастный случай, произошедший с Обучающимся в период прохождения практики у Исполнителя, расследуется и учитывается администрацией Исполнителя.
</p>
<p class="western">
<span style="margin-right:5px;">5.3.</span>При изменении программы прохождения практики, Заказчик должен заблаговременно, но не позднее, чем за две недели предупредить об этом Исполнителя.
</p>
<p class="western">
<span style="margin-right:5px;">5.4.</span>Все изменения и дополнения к настоящему Договору должны быть выполнены в письменной форме и подписаны полномочными представителями обеих Сторон.
</p>
<p class="western">
<span style="margin-right:5px;">5.5.</span>Во всем остальном, что не урегулировано настоящим договором, стороны руководствуются Положением о производственной практике, утвержденным ООО «ИПО» и действующим законодательством РФ.
</p>
<p class="western">
<span style="margin-right:5px;">5.6.</span>Настоящий Договор составлен в двух экземплярах, имеющих одинаковую юридическую силу, и хранится по одному экземпляру у каждой из Сторон.
</p>

<p class="western">
<span style="margin-right:5px;">5.7.</span>Приложения к договору, являющиеся его неотъемлемой частью:
</p>


<p class="western">
<span style="margin-right:5px;">&#8212</span>Приложение №1 «Список Обучающихся».
</p>
<p class="western">
<span style="margin-right:5px;">&#8212</span>Приложение №2 «Стоимость услуг».
</p>
<p class="western">
<span style="margin-right:5px;">&#8212</span>Приложение №3 «Акт оказанных услуг».
</p>
