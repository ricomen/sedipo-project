<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="content-type" content="text/html; charset=utf-8"/>
    <style type="text/css">
	@page { margin-left: 0.1cm; margin-right: 0.1cm; margin-top: 0.1cm; margin-bottom: 0.1cm; size: A4 landscape;  }
	p {  text-align: left; orphans: 2; widows: 2 }
	p.western { font-family: "DejaVu Serif", serif; font-size: 10pt; text-align: justify;  margin-bottom: 4px;  margin-top: 4px; }
	p.center { font-family: "DejaVu Serif", serif; font-size: 12pt; text-align: center;   margin-bottom: 4px;  margin-top: 4px;  }
	p.left { font-family: "DejaVu Serif", serif; font-size: 12pt; text-align: left;   margin-bottom: 4px;  margin-top: 4px;  }
	h1.western { font-family: "DejaVu Serif", serif; font-size: 14pt; text-align: center;  margin-bottom: 15px;  margin-top: 15px;  }
	h2.western { font-family: "DejaVu Serif", serif; font-size: 13pt; text-align: center;  margin-bottom: 7px;  margin-top: 7px;  }
	h3.western { font-family: "DejaVu Serif", serif; font-size: 12pt; text-align: center;  margin-bottom: 5px;  margin-top: 5px;  }
	h4.western { font-family: "DejaVu Serif", serif; font-size: 12pt; text-align: center;  margin-bottom: 5px;  margin-top: 5px;  }
	p.table { font-family: "DejaVu Serif", serif; font-size: 10pt; text-align: left }
    </style>
	<title>Документ о квалификации</title>
</head>
<body text="#000000" bgcolor="#FFFFFF" link="#000000" vlink="#000000" alink="#000000" >


<table border="0" width="100%"  {if $print_v=="false"}style="background-image: url(https:/{$smarty.server.SERVER_NAME}/documents/diplom1.png)"{/if}>
<!--<tr align="center" style="background-image: url(documents/udostoverenie1_1.png); background-repeat: no-repeat;">-->
<tr valign="top">
<td width="50%">
    <p class="center" style=" margin-bottom: 4px;  margin-top: 560px;"> № {$cert['protocol_num']}</p>
    <p class="center" style=" margin-bottom: 4px;  margin-top: 40px;"> {$cert['date_protocol']|date_format:"%02e.%m.%Y"}</p>
    <p style="line-height: 3.8;"><br /></p>
</td>

<td  align="left"  width="50%">
<table width="100%" border="0">
<tr  >

    <td width="40%" valign="top">
        <p class="western" ></p>
    </td>
    <td>
        <p class="western" style=" margin-bottom: 4px;  margin-top: 110px;"><b>{$user['lastname']}<br />
        {$user['firstname']}<br />
        {$user['middlename']}</b></p>
    </td>
</tr>    
<tr>
    <td colspan="2">
        <p class="center" style=" margin-bottom: 4px;  margin-top: 85px;  margin-left: 30px;  margin-right: 30px; text-transform: uppercase; ">{$self_data['name']}</p>
    </td>
</tr>    

<tr  >
    <td colspan="2" valign="top"  style="height: 240px;">
        <p class="center" style=" margin-bottom: 4px;  margin-top: 100px;  margin-left: 30px;  margin-right: 30px; ">{$cert['name']}</p>
    </td>
</tr>    




<tr >
{if $print_v=="false"}
    <td  colspan="2" >

<div style="position: relative; top: 0px; right: 0px;">        
<div style="position: absolute; top: -50px; right: 40px; "><img src="https://{$smarty.server.SERVER_NAME}/documents/signs/podpis.png" width="150px" align="top" ></div>
<div style="position: absolute; top: -10px; right: 150px; "><img src="https://{$smarty.server.SERVER_NAME}/documents/signs/Stamp.png" width="150px" align="top" ></div>
</div>
    </td>
{/if}
</tr>    
</table>
</td>

</tr>
</table>
</body>
</html>
