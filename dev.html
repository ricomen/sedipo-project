<script>
  function displayChart(type, ordersCount, searchDate) {
    if (!ordersCount) return;
    const ctx = document.getElementById('myChart');
    if (!ctx) return;
    let myChart = Chart.getChart('myChart');
    if (myChart) myChart.destroy();
    new Chart(ctx, {
      type: type || 'bar',
      data: {
        labels: ordersCount.map((row) => row.status),
        datasets: [{ label: searchDate, data: ordersCount.map((row) => row.count), borderWidth: 1 }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        barThickness: 30,
        scales: { y: { beginAtZero: true } },
      },
    });
  }
</script>
